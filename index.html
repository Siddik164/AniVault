<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniVult - Your Anime Tracker</title>
    <meta name="description" content="AniVult — Track, discover, and connect.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
    <canvas id="live-bg"></canvas>
    <div class="app-container" style="display: none;">
        <!-- Top Navigation -->
        <header class="top-bar">
            <button id="menu-toggle" class="menu-toggle" aria-label="Open Menu">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
            </button>
            <div class="logo">
                <h1>Ani<span>Vult</span></h1>
            </div>
            <div class="search-wrapper">
                <div class="search-container" id="search-container">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-input" placeholder="Search for an anime...">
                    <div class="spinner hidden" id="search-spinner"></div>
                </div>
            </div>
        </header>

        <!-- Slide-in Drawer -->
        <div id="nav-drawer" class="nav-drawer">
            <div class="drawer-header">
                <div id="user-profile-badge" class="user-profile-badge hidden"></div>
                <button id="close-drawer" class="close-drawer">&times;</button>
            </div>
            <nav class="drawer-nav">
                <button class="nav-item active" data-view="discover">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Home
                </button>
                <button class="nav-item" data-view="vault">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                    Vault
                </button>
                <button class="nav-item" data-view="chat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    Community Wall
                </button>
                <button class="nav-item" data-view="leaderboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
                    Leaderboard
                </button>
                <button class="nav-item" data-view="genres">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                    Genres
                </button>
                <button class="nav-item admin-only hidden" id="admin-nav-item" data-view="admin">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    Admin Panel
                </button>
                <button class="nav-item" data-view="settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Personalization
                </button>
                <div class="nav-spacer" style="flex-grow: 1;"></div>
                <button class="nav-item logout-btn" id="logout-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </button>
            </nav>
        </div>
        <div id="drawer-overlay" class="drawer-overlay"></div>

        <!-- Main Content Area -->
        <main class="main-content">
            <div class="view-content" id="view-content">
                <!-- Content injected via JS -->
            </div>
        </main>

        <!-- Global Bulk Action Panel -->
        <div id="global-bulk-panel" class="hidden" style="position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 100; background: rgba(20,20,20,0.95); border: 1px solid var(--accent-primary); padding: 1rem 1.5rem; border-radius: 12px; display: flex; align-items: center; gap: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5); transition: opacity 0.3s ease;">
            <div style="color: var(--text-main); font-weight: 600; font-size: 1rem; white-space: nowrap;" id="global-bulk-count">0 Selected</div>
            <select id="global-bulk-status" class="admin-role-select" style="margin: 0; min-width: 150px;">
                <option value="" disabled selected>Change Status...</option>
                <option value="watching">Watching</option>
                <option value="watched">Watched</option>
                <option value="plan_to_watch">Plan to Watch</option>
                <option value="none">Remove from List</option>
            </select>
            <button class="btn btn-primary btn-sm" id="global-bulk-apply" disabled style="white-space: nowrap;">Apply</button>
            <button class="btn btn-secondary btn-sm" id="global-bulk-cancel" style="white-space: nowrap; margin-left: auto;">Cancel</button>
        </div>
    </div>

    <!-- Modal for Anime Details -->
    <div class="modal-overlay hidden" id="anime-modal">
        <div class="modal-content">
            <button class="close-modal" id="close-modal">&times;</button>
            <div class="modal-body" id="modal-body">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <!-- Login Overlay -->
    <div class="login-overlay hidden" id="login-overlay">
        <div class="login-card">
            <div class="login-logo">
                <h1>Ani<span>Vult</span></h1>
            </div>
            <p class="login-subtitle" id="login-subtitle">Sign in to track your anime journey.</p>
            
            <div class="login-tabs">
                <button class="login-tab active" id="tab-login" type="button">Login</button>
                <button class="login-tab" id="tab-register" type="button">Sign Up</button>
            </div>
            
            <form id="login-form">
                <div class="input-group">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <input type="email" id="email-input" placeholder="Email Address" required autocomplete="email">
                </div>
                <div class="input-group">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" id="password-input" placeholder="Password" required autocomplete="current-password">
                </div>
                <div id="login-error" class="login-error hidden">Invalid credentials.</div>
                <button type="submit" class="btn btn-primary login-btn" id="submit-btn">Login</button>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="app.js?v=2"></script>
</body>
</html>
